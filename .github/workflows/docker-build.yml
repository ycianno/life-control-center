name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker:
    name: Test and Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Syntax check
        run: npm run check:syntax
      - name: Regression test
        run: npm test
      - name: Build image
        run: docker build -t the-forge:ci .
      - name: Smoke test (boots and serves login)
        run: |
          docker run -d --name forge-ci -e APP_PASSWORD=ci -p 3007:3007 the-forge:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3007/login.html >/dev/null; then echo "up"; exit 0; fi
            sleep 1
          done
          echo "server did not come up"; docker logs forge-ci; exit 1
      - name: Runtime user is non-root
        run: docker exec forge-ci sh -c "test \"$(awk '/^Uid:/ {print $2}' /proc/1/status)\" != 0"
