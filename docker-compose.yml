services:
  forge:
    # Option A (default): build from source in this repo.
    build: .
    # Option B: skip the build and use the prebuilt multi-arch image instead —
    # comment out "build: ." above and uncomment the line below.
    # image: ghcr.io/ycianno/the-forge:latest
    container_name: forge
    ports:
      - "3007:3007"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - PORT=3007
      # Reads from a .env file in this directory (see .env.example).
      # Change APP_PASSWORD before deploying — it protects the dashboard.
      - APP_PASSWORD=${APP_PASSWORD:-changeme}
      - DB_PATH=/app/data/database.sqlite
